<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToyWorld - Detalhes do Brinquedo</title>
    <link href="./style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-toy-bg min-h-screen">

    <!-- Navbar Minimalista -->
    <nav class="fixed top-4 left-4 right-4 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 bg-white/80 backdrop-blur-md clay-card border-none flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="w-10 h-10 bg-toy-primary rounded-full flex items-center justify-center text-white group-hover:scale-110 transition-transform">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </div>
                <span class="font-bold text-toy-text hidden sm:inline">Voltar ao Catálogo</span>
            </a>
            
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-toy-accent rounded-full flex items-center justify-center text-white">
                    <i data-lucide="blocks" class="w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold text-toy-primary tracking-tight">ToyWorld</span>
            </div>

            <button class="relative w-12 h-12 flex items-center justify-center bg-toy-primary text-white rounded-2xl cursor-pointer">
                <i data-lucide="shopping-cart" class="w-6 h-6"></i>
            </button>
        </div>
    </nav>

    <!-- Conteúdo do Produto -->
    <main class="pt-32 pb-20 px-4">
        <div class="max-w-6xl mx-auto" id="product-detail">
            <!-- Loader -->
            <div class="animate-pulse flex flex-col md:flex-row gap-12">
                <div class="w-full md:w-1/2 aspect-square bg-white rounded-[40px]"></div>
                <div class="w-full md:w-1/2 space-y-6">
                    <div class="h-10 bg-white rounded-xl w-3/4"></div>
                    <div class="h-6 bg-white rounded-xl w-1/4"></div>
                    <div class="h-32 bg-white rounded-xl w-full"></div>
                    <div class="h-16 bg-white rounded-xl w-1/2"></div>
                </div>
            </div>
        </div>

        <!-- Seção de Relacionados -->
        <section class="max-w-6xl mx-auto mt-20 border-t-4 border-white pt-16">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-3xl font-black text-toy-text flex items-center gap-3">
                    <i data-lucide="shapes" class="text-toy-accent"></i> Quem viu este, também gostou
                </h2>
                <a href="index.html" class="text-toy-primary font-bold hover:underline">Ver todos</a>
            </div>
            <div id="related-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Carregado via JS -->
            </div>
        </section>
    </main>

    <script>
        const API_BASE = 'http://localhost:8080/api/brinquedos';
        lucide.createIcons();

        // 1. PEGAR ID DA URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) {
            window.location.href = 'index.html';
        }

        // 2. BUSCAR DADOS DO BACKEND
        async function loadProductDetails() {
            try {
                const response = await fetch(`${API_BASE}/${productId}`);
                if (!response.ok) throw new Error('Produto não encontrado');
                
                const p = await response.json();
                renderDetails(p);
                loadRelated(p.categoria, p.id); // Busca os relacionados
            } catch (error) {
                console.error(error);
                document.getElementById('product-detail').innerHTML = `
                    <div class="clay-card p-12 text-center bg-white">
                        <i data-lucide="frown" class="w-20 h-20 text-toy-accent mx-auto mb-6"></i>
                        <h2 class="text-3xl font-black mb-4">Ops! Brinquedo não encontrado.</h2>
                        <a href="index.html" class="btn-clay-primary inline-block">Voltar para a Loja</a>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        async function loadRelated(categoria, currentId) {
            try {
                // Usamos seu endpoint de filtro: GET /api/brinquedos/filtro?categoria=...
                const response = await fetch(`${API_BASE}/filtro?categoria=${categoria}`);
                const products = await response.json();
                
                // Filtramos o produto atual para não aparecer na lista de recomendados
                const filtered = products.filter(p => p.id !== currentId).slice(0, 4);
                renderRelated(filtered);
            } catch (e) { console.error("Erro ao carregar relacionados:", e); }
        }

        function renderRelated(products) {
            const container = document.getElementById('related-container');
            if(products.length === 0) {
                container.innerHTML = '<p class="col-span-full text-slate-400 font-bold">Nenhum produto similar no momento.</p>';
                return;
            }

            container.innerHTML = products.map(p => `
                <div class="clay-card p-4 flex flex-col group bg-white border-none text-sm">
                    <a href="detalhes.html?id=${p.id}" class="block aspect-square bg-toy-bg rounded-2xl mb-4 flex items-center justify-center relative overflow-hidden">
                        <i data-lucide="package" class="w-10 h-10 text-toy-primary opacity-10 absolute"></i>
                        <img src="${p.caminhoImagem || ''}" class="w-full h-full object-contain p-4 group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://placehold.co/200x200/EEF2FF/4F46E5?text=Brinquedo'">
                    </a>
                    <div class="space-y-1">
                        <h4 class="font-black text-toy-text line-clamp-1">${p.nome}</h4>
                        <div class="flex items-center justify-between">
                            <span class="font-black text-toy-primary text-lg">R$ ${p.preco.toFixed(2)}</span>
                            <a href="detalhes.html?id=${p.id}" class="w-8 h-8 bg-toy-bg text-toy-primary rounded-lg flex items-center justify-center hover:bg-toy-primary hover:text-white transition-all">
                                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderDetails(p) {
            const container = document.getElementById('product-detail');
            const precoOriginal = p.desconto > 0 ? (p.preco / (1 - p.desconto/100)).toFixed(2) : null;

            container.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-12 items-start">
                    <!-- Imagem do Produto -->
                    <div class="w-full lg:w-1/2 sticky top-32">
                        <div class="clay-card aspect-square bg-white flex items-center justify-center p-12 relative overflow-hidden border-none">
                            ${p.quantidade <= 5 ? '<span class="absolute top-8 left-8 bg-red-500 text-white text-xs font-black px-4 py-2 rounded-xl z-10 animate-pulse">ÚLTIMAS UNIDADES!</span>' : ''}
                            <i data-lucide="package" class="w-40 h-40 text-toy-primary opacity-10 absolute"></i>
                            <img src="${p.caminhoImagem || ''}" class="w-full h-full object-contain relative z-10 drop-shadow-2xl" onerror="this.src='https://placehold.co/600x600/EEF2FF/4F46E5?text=Brinquedo'">
                        </div>
                    </div>

                    <!-- Informações do Produto -->
                    <div class="w-full lg:w-1/2 space-y-8">
                        <div>
                            <span class="inline-block px-4 py-1 bg-toy-accent/10 text-toy-accent rounded-full font-black text-xs uppercase tracking-widest mb-4">
                                ${p.categoria}
                            </span>
                            <h1 class="text-5xl md:text-6xl font-black text-toy-text leading-tight">${p.nome}</h1>
                        </div>

                        <div class="flex items-center gap-6">
                            <div>
                                ${precoOriginal ? `<span class="text-xl text-slate-400 line-through font-bold">R$ ${precoOriginal}</span>` : ''}
                                <div class="text-5xl font-black text-toy-primary">R$ ${p.preco.toFixed(2)}</div>
                            </div>
                            ${p.desconto > 0 ? `
                                <div class="bg-green-500 text-white px-4 py-2 rounded-2xl font-black text-lg shadow-lg">
                                    -${p.desconto}% OFF
                                </div>
                            ` : ''}
                        </div>

                        <div class="clay-card p-8 bg-white/50 border-none space-y-4">
                            <h3 class="text-xl font-black flex items-center gap-2">
                                <i data-lucide="file-text" class="w-5 h-5 text-toy-primary"></i> Descrição
                            </h3>
                            <p class="text-lg text-slate-600 leading-relaxed font-medium">
                                ${p.descricao || 'Este brinquedo incrível está esperando por você para começar a diversão! Feito com materiais de alta qualidade e segurança garantida.'}
                            </p>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-4 items-center pt-6">
                            <button onclick="encomendar(${p.id})" ${p.quantidade === 0 ? 'disabled' : ''} 
                                    class="w-full sm:flex-1 btn-clay-primary text-xl py-5 flex items-center justify-center gap-3 group disabled:bg-slate-300 disabled:shadow-none">
                                <i data-lucide="shopping-bag" class="w-6 h-6 group-hover:animate-bounce"></i>
                                ${p.quantidade === 0 ? 'Esgotado' : 'Encomendar Agora'}
                            </button>
                            <div class="text-center sm:text-left">
                                <p class="text-sm font-black text-slate-400 uppercase tracking-widest">Estoque Disponível</p>
                                <p class="text-lg font-black text-toy-text">${p.quantidade} unidades em estoque</p>
                            </div>
                        </div>

                        <!-- Benefícios -->
                        <div class="grid grid-cols-2 gap-4 pt-8">
                            <div class="flex items-center gap-3 text-slate-500 font-bold">
                                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                                    <i data-lucide="truck" class="w-5 h-5 text-toy-primary"></i>
                                </div>
                                <span class="text-sm">Entrega Rápida</span>
                            </div>
                            <div class="flex items-center gap-3 text-slate-500 font-bold">
                                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                                    <i data-lucide="shield-check" class="w-5 h-5 text-toy-primary"></i>
                                </div>
                                <span class="text-sm">Compra Segura</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        async function encomendar(id) {
            try {
                const response = await fetch(`${API_BASE}/encomendar/${id}`, { method: 'POST' });
                if(response.ok) {
                    showToast("Encomendado com sucesso! 🎉", "success");
                    loadProductDetails(); // Recarrega para atualizar estoque
                } else {
                    showToast("Não foi possível processar o pedido.", "error");
                }
            } catch (e) { showToast("Erro de conexão.", "error"); }
        }

        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl font-black text-white shadow-2xl z-[200] animate-bounce ${type === 'success' ? 'bg-green-500' : 'bg-red-500'}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.addEventListener('DOMContentLoaded', loadProductDetails);
    </script>
</body>
</html>
