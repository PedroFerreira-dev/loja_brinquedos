<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Editar Brinquedo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Editar Produto</h2>
    <hr>
    <form th:action="@{/atualizar}" th:object="${brinquedoParaEditar}" method="post" class="row g-3">
        
        <input type="hidden" th:field="*{id}">

        <div class="col-md-6">
            <label class="form-label">Nome do Brinquedo</label>
            <input type="text" th:field="*{nome}" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label">Preço</label>
            <input type="number" step="0.01" th:field="*{preco}" class="form-control">
        </div>
        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-success">Concluir Atualização</button>
            <a href="/" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</body>
</html>
