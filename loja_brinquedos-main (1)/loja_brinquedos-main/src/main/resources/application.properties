spring.application.name=CatalogoBrinquedos
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/loja_brinquedos?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Aumenta limite de pacotes para suportar imagens em Base64 grandes (10MB+)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.max-http-header-size=32KB