<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToyWorld - Painel Admin</title>
    <link href="./style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">

    <!-- Sidebar / Nav -->
    <div class="flex min-h-screen">
        <aside class="w-64 bg-toy-text text-white p-6 space-y-8 hidden md:block">
            <div class="flex items-center gap-2 mb-10">
                <div class="w-8 h-8 bg-toy-accent rounded-full flex items-center justify-center text-white">
                    <i data-lucide="blocks" class="w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">AdminPanel</span>
            </div>
            
            <nav class="space-y-4">
                <a href="#" class="flex items-center gap-3 p-3 bg-toy-primary rounded-xl font-bold">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="index.html" class="flex items-center gap-3 p-3 hover:bg-white/10 rounded-xl transition-all font-bold">
                    <i data-lucide="eye" class="w-5 h-5"></i> Ver Loja
                </a>
                <button onclick="logout()" class="flex items-center gap-3 p-3 hover:bg-red-500/20 text-red-400 rounded-xl transition-all font-bold w-full text-left cursor-pointer">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Sair
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-10">
            <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
                <div>
                    <h1 class="text-4xl font-black text-toy-text">Gerenciar Catálogo</h1>
                    <p class="text-slate-500 font-medium">Adicione, edite ou remova brinquedos do sistema.</p>
                </div>
                <button onclick="openModal()" class="btn-clay-primary flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-6 h-6"></i> Novo Brinquedo
                </button>
            </header>

            <!-- Tabela de Produtos -->
            <div class="clay-card bg-white overflow-hidden border-none">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-toy-bg text-toy-text uppercase text-xs font-black">
                            <tr>
                                <th class="px-6 py-4">Produto</th>
                                <th class="px-6 py-4">Categoria</th>
                                <th class="px-6 py-4">Preço</th>
                                <th class="px-6 py-4">Estoque</th>
                                <th class="px-6 py-4">Vendas</th>
                                <th class="px-6 py-4 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="admin-product-table" class="divide-y divide-slate-100">
                            <!-- Carregado via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form (Novo/Editar) -->
    <div id="toy-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-toy-text/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="clay-card max-w-2xl w-full p-8 relative bg-white z-10 max-h-[90vh] overflow-y-auto">
            <h2 id="modal-title" class="text-3xl font-black mb-6">Novo Brinquedo</h2>
            <form id="toy-form" onsubmit="handleSubmit(event)" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="hidden" id="toy-id">
                <div class="md:col-span-2">
                    <label class="block text-sm font-black mb-2">Nome do Brinquedo</label>
                    <input type="text" id="toy-nome" required class="w-full bg-toy-bg border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-toy-primary">
                </div>
                <div>
                    <label class="block text-sm font-black mb-2">Categoria</label>
                    <input type="text" id="toy-categoria" required class="w-full bg-toy-bg border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-toy-primary" placeholder="Ex: Educativos">
                </div>
                <div>
                    <label class="block text-sm font-black mb-2">Preço (R$)</label>
                    <input type="number" step="0.01" id="toy-preco" required class="w-full bg-toy-bg border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-toy-primary">
                </div>
                <div>
                    <label class="block text-sm font-black mb-2">Estoque Inicial</label>
                    <input type="number" id="toy-quantidade" required class="w-full bg-toy-bg border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-toy-primary">
                </div>
                <div>
                    <label class="block text-sm font-black mb-2">Desconto (%)</label>
                    <input type="number" id="toy-desconto" value="0" class="w-full bg-toy-bg border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-toy-primary">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-black mb-2">URL da Imagem</label>
                    <input type="text" id="toy-imagem" class="w-full bg-toy-bg border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-toy-primary" placeholder="http://...">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-black mb-2">Descrição</label>
                    <textarea id="toy-descricao" rows="3" class="w-full bg-toy-bg border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-toy-primary"></textarea>
                </div>
                <div class="md:col-span-2 flex justify-end gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="px-6 py-3 font-bold text-slate-400 hover:text-toy-text transition-all">Cancelar</button>
                    <button type="submit" class="btn-clay-primary px-10">Salvar Brinquedo</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Repor Estoque -->
    <div id="repor-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-toy-text/40 backdrop-blur-sm" onclick="closeReporModal()"></div>
        <div class="clay-card max-w-sm w-full p-8 relative bg-white z-10">
            <h2 class="text-2xl font-black mb-4">Repor Estoque</h2>
            <p id="repor-toy-nome" class="text-slate-500 mb-6 font-bold"></p>
            <form onsubmit="handleRepor(event)" class="space-y-4">
                <input type="hidden" id="repor-toy-id">
                <div>
                    <label class="block text-sm font-black mb-2">Quantidade a Adicionar</label>
                    <input type="number" id="repor-quantidade" required min="1" class="w-full bg-toy-bg border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-toy-primary">
                </div>
                <button type="submit" class="w-full btn-clay-primary">Confirmar Reposição</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/brinquedos';
        const AUTH = localStorage.getItem('toy_auth');
        lucide.createIcons();

        // Proteção de Rota
        if(!AUTH) window.location.href = 'index.html';

        document.addEventListener('DOMContentLoaded', loadAdminProducts);

        async function loadAdminProducts() {
            try {
                const response = await fetch(API_BASE);
                const products = await response.json();
                const tableBody = document.getElementById('admin-product-table');
                
                tableBody.innerHTML = products.map(p => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-toy-bg rounded-lg flex items-center justify-center">
                                    <i data-lucide="package" class="w-5 h-5 text-toy-primary/40"></i>
                                </div>
                                <span class="font-bold text-toy-text">${p.nome}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 font-medium text-slate-500">${p.categoria}</td>
                        <td class="px-6 py-4 font-black">R$ ${p.preco.toFixed(2)}</td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-xs font-black ${p.quantidade <= 5 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                                ${p.quantidade} un.
                            </span>
                        </td>
                        <td class="px-6 py-4 font-bold text-indigo-600">${p.vendas} vendas</td>
                        <td class="px-6 py-4">
                            <div class="flex items-center justify-center gap-2">
                                <button onclick="openReporModal(${p.id}, '${p.nome}')" title="Repor Estoque" class="p-2 hover:bg-green-100 text-green-600 rounded-lg transition-all cursor-pointer">
                                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                                </button>
                                <button onclick="editToy(${p.id})" title="Editar" class="p-2 hover:bg-blue-100 text-blue-600 rounded-lg transition-all cursor-pointer">
                                    <i data-lucide="edit-3" class="w-5 h-5"></i>
                                </button>
                                <button onclick="deleteToy(${p.id})" title="Excluir" class="p-2 hover:bg-red-100 text-red-600 rounded-lg transition-all cursor-pointer">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        // CRUD Ações
        async function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('toy-id').value;
            const toyData = {
                nome: document.getElementById('toy-nome').value,
                preco: parseFloat(document.getElementById('toy-preco').value),
                categoria: document.getElementById('toy-categoria').value,
                caminhoImagem: document.getElementById('toy-imagem').value,
                quantidade: parseInt(document.getElementById('toy-quantidade').value),
                desconto: parseFloat(document.getElementById('toy-desconto').value),
                descricao: document.getElementById('toy-descricao').value
            };

            const url = id ? `${API_BASE}/${id}` : API_BASE;
            const method = id ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Basic ${AUTH}`
                    },
                    body: JSON.stringify(toyData)
                });

                if(response.ok) {
                    showToast(id ? "Atualizado!" : "Criado!", "success");
                    closeModal();
                    loadAdminProducts();
                } else {
                    showToast("Erro ao salvar.", "error");
                }
            } catch (e) { showToast("Erro de conexão.", "error"); }
        }

        async function editToy(id) {
            try {
                const response = await fetch(`${API_BASE}/${id}`);
                const p = await response.json();
                
                document.getElementById('toy-id').value = id;
                document.getElementById('toy-nome').value = p.nome;
                document.getElementById('toy-preco').value = p.preco;
                document.getElementById('toy-categoria').value = p.categoria;
                document.getElementById('toy-imagem').value = p.caminhoImagem || '';
                document.getElementById('toy-quantidade').value = p.quantidade;
                document.getElementById('toy-desconto').value = p.desconto || 0;
                document.getElementById('toy-descricao').value = p.descricao || '';
                
                document.getElementById('modal-title').textContent = "Editar Brinquedo";
                document.getElementById('toy-modal').classList.remove('hidden');
            } catch (e) { console.error(e); }
        }

        async function deleteToy(id) {
            if(!confirm("Tem certeza que deseja excluir este brinquedo?")) return;
            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Basic ${AUTH}` }
                });
                if(response.ok) {
                    showToast("Excluído!", "success");
                    loadAdminProducts();
                }
            } catch (e) { showToast("Erro ao excluir.", "error"); }
        }

        // Reposição (PATCH)
        async function handleRepor(e) {
            e.preventDefault();
            const id = document.getElementById('repor-toy-id').value;
            const qtd = document.getElementById('repor-quantidade').value;
            
            try {
                const response = await fetch(`${API_BASE}/repor/${id}?quantidade=${qtd}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Basic ${AUTH}` }
                });
                if(response.ok) {
                    showToast("Estoque reposto!", "success");
                    closeReporModal();
                    loadAdminProducts();
                }
            } catch (e) { showToast("Erro na reposição.", "error"); }
        }

        // Modais
        function openModal() {
            document.getElementById('toy-form').reset();
            document.getElementById('toy-id').value = '';
            document.getElementById('modal-title').textContent = "Novo Brinquedo";
            document.getElementById('toy-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('toy-modal').classList.add('hidden'); }
        
        function openReporModal(id, nome) {
            document.getElementById('repor-toy-id').value = id;
            document.getElementById('repor-toy-nome').textContent = nome;
            document.getElementById('repor-modal').classList.remove('hidden');
        }
        function closeReporModal() { document.getElementById('repor-modal').classList.add('hidden'); }

        function logout() {
            localStorage.removeItem('toy_auth');
            window.location.href = 'index.html';
        }

        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `fixed top-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl font-black text-white shadow-2xl z-[200] animate-bounce ${type === 'success' ? 'bg-green-500' : 'bg-red-500'}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
